appId: com.unlockhub.app
---
# Nota: el mensaje de error está hardcodeado en español en useAuth.ts (bug conocido)
- runFlow: _setup_logout.yaml

- assertVisible: "Your achievements hub"

- tapOn: "you@email.com"
- inputText: "test99@example.com"
- tapOn: "Your achievements hub"
- tapOn: "Password"
- inputText: "WrongPassword123!"
- tapOn: "Log in"
- waitForAnimationToEnd

# Error message (hardcoded in Spanish regardless of locale)
- assertVisible: "contraseña incorrectos"
- assertNotVisible: "Library"
