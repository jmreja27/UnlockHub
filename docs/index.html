<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Documentación legal — UnlockHub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: #1a1a1a;
      background: #f9f9f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 480px;
      width: 100%;
      padding: 48px 24px;
      text-align: center;
    }

    .logo {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -1px;
      color: #111;
      margin-bottom: 4px;
    }

    .tagline {
      font-size: 14px;
      color: #777;
      margin-bottom: 48px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-card {
      display: block;
      background: #ffffff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 20px 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
      text-align: left;
    }

    .link-card:hover {
      border-color: #2563eb;
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.1);
    }

    .link-card-title {
      font-size: 16px;
      font-weight: 600;
      color: #111;
      margin-bottom: 4px;
    }

    .link-card-desc {
      font-size: 13px;
      color: #777;
    }

    footer {
      margin-top: 48px;
      font-size: 13px;
      color: #aaa;
    }

    @media (max-width: 480px) {
      .logo { font-size: 32px; }
      .container { padding: 32px 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">UnlockHub</div>
    <p class="tagline">Tracking unificado de logros de videojuegos</p>

    <div class="links">
      <a href="privacy-policy.html" class="link-card">
        <div class="link-card-title">Política de Privacidad</div>
        <div class="link-card-desc">Cómo recopilamos, usamos y protegemos tus datos personales</div>
      </a>
      <a href="terms-of-service.html" class="link-card">
        <div class="link-card-title">Términos y Condiciones</div>
        <div class="link-card-desc">Condiciones de uso del servicio, suscripción premium y sistema de puntos</div>
      </a>
    </div>

    <footer>
      <p>© 2026 Juan Jose Muñoz Reja Villalba · <a href="mailto:soporte@unlockhub.app" style="color: #aaa;">soporte@unlockhub.app</a></p>
    </footer>
  </div>
</body>
</html>
